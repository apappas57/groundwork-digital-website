<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <defs>
          <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" style="stop-color:#1ABC9C;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#2ECC71;stop-opacity:1" />
          </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="400" height="400" rx="48" fill="#0A0F1C"/>

    <!-- Concept: "The Blueprint G" -->

    <!-- Main circular arc of the G - thick stroke like Mullvad -->
    <path d="M 200 80 A 120 120 0 1 0 320 200"
              fill="none" stroke="url(#tealGrad)" stroke-width="44" stroke-linecap="square"/>

    <!-- Horizontal bar of the G -->
    <rect x="196" y="178" width="124" height="44" rx="0" fill="url(#tealGrad)"/>

    <!-- Small structural crosshairs / blueprint marker at the end of the bar -->
    <line x1="200" y1="164" x2="200" y2="236" stroke="#0A0F1C" stroke-width="3"/>
    <line x1="186" y1="200" x2="214" y2="200" stroke="#0A0F1C" stroke-width="3"/>

    <!-- Blueprint corner markers -->
    <!-- Top-left -->
    <path d="M 56 56 L 56 80 M 56 56 L 80 56" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" opacity="0.35"/>
    <!-- Top-right -->
    <path d="M 344 56 L 344 80 M 344 56 L 320 56" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" opacity="0.35"/>
    <!-- Bottom-left -->
    <path d="M 56 344 L 56 320 M 56 344 L 80 344" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" opacity="0.35"/>
    <!-- Bottom-right -->
    <path d="M 344 344 L 344 320 M 344 344 L 320 344" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" opacity="0.35"/>
</svg>
